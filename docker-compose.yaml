
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: postgres
      TZ: Europe/Saratov
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  collector_server:
    build:
      context: .
      target: runtime_collector
    privileged: true
    restart: unless-stopped
    environment:
      TZ: Europe/Saratov
    depends_on:
      db:
        condition: service_healthy
    devices:
      - "/dev/ttyS0:/dev/ttyS0"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 9000 || exit 1"] 
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard_client:
    build:
      context: .
      target: runtime_dashboard
    ports: 
      - "9000:9000"
    environment:
      TZ: Europe/Saratov
      COLLECTOR_HOST: collector_server
    depends_on:
      db:
        condition: service_healthy 
      collector_server:
        condition: service_healthy
    volumes:
       - ./dashboard/dist:/app/dashboard/dist:delegated 